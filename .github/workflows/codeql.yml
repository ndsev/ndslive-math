name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'   # weekly, Mondays 04:23 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: manual
          - language: java-kotlin
            build-mode: manual
          - language: c-cpp
            build-mode: manual
    steps:
      - uses: actions/checkout@v4

      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      # Compiled languages need an explicit build (each lives in a subdirectory,
      # so CodeQL's autobuild can't find them from the repo root).
      - if: matrix.language == 'c-cpp'
        name: Build C++
        run: |
          cmake -S cpp -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
      - if: matrix.language == 'go'
        name: Build Go
        working-directory: go
        run: go build ./...
      - if: matrix.language == 'java-kotlin'
        name: Build Java
        working-directory: java
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
