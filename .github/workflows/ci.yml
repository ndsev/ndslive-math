name: ndsmath CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'python-v*'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r python/requirements.txt
    - name: Install ndsmath
      run: |
        cd python
        pip install -e .
    - name: Run tests
      run: |
        cd python
        python -m unittest discover tests

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine
    - name: Set version
      id: set_version
      run: |
        cd python
        if [[ $GITHUB_REF == refs/tags/python-v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/python-v}
        elif [[ $GITHUB_REF == refs/heads/main ]]; then
          VERSION=0.0.999.dev1
        else
          VERSION=0.0.999.dev0
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        sed -i "s/version=version,/version='${VERSION}',/" setup.py
    - name: Build wheel
      run: |
        cd python
        python setup.py sdist bdist_wheel
    - name: Deploy to Artifactory
      env:
        TWINE_USERNAME: ${{ secrets.NDS_ARTIFACTORY_USER }}
        TWINE_PASSWORD: ${{ secrets.NDS_ARTIFACTORY_USER_PW }}
      run: |
        cd python
        REPO_URL="https://artifactory.nds-association.org/artifactory/api/pypi/tooling-pypi"
        twine check dist/*
        twine upload --verbose --repository-url $REPO_URL dist/*
