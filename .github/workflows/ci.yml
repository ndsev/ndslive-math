name: ndsmath CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'python-v*'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Install ndsmath
      run: |
        # Move Python package to root temporarily for install
        cp -r python/* .
        pip install -e .
    - name: Run tests
      run: |
        python -m unittest discover tests
    - name: Cleanup test environment
      run: |
        # Reset repository to clean state
        git reset --hard HEAD
        git clean -fd

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/python-v'))

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine setuptools-scm
    - name: Prepare build environment
      run: |
        # Move Python package to root temporarily for build
        cp -r python/* .
        # Show version info
        python -m setuptools_scm
    - name: Build distributions
      run: |
        python -m build
        # Move built artifacts back to python/dist
        mkdir -p python/dist
        mv dist/* python/dist/
    - name: Cleanup
      run: |
        # Reset repository to clean state, preserving python/dist
        git reset --hard HEAD
        git clean -fd
    - name: Deploy to Artifactory
      env:
        TWINE_USERNAME: ${{ secrets.NDS_ARTIFACTORY_USER }}
        TWINE_PASSWORD: ${{ secrets.NDS_ARTIFACTORY_TOKEN }}
      run: |
        cd python
        REPO_URL="https://artifactory.nds-association.org/artifactory/api/pypi/tooling-pypi"
        twine check dist/*
        twine upload --verbose --repository-url $REPO_URL dist/*
