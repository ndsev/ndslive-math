name: ndsmath CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Validate CHANGELOG
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          # ON MAIN: All entries must have dates (no unreleased allowed)
          UNRELEASED=$(grep -cE "^## \[v[0-9.]+\]$" CHANGELOG.md || true)

          if [ "$UNRELEASED" -gt 0 ]; then
            echo "ERROR: Found $UNRELEASED unreleased entries on main branch"
            echo "Add release dates: ## [vX.Y.Z] - YYYY-MM-DD"
            grep -E "^## \[v[0-9.]+\]$" CHANGELOG.md
            exit 1
          fi
          echo "OK: All changelog entries have release dates"
        else
          # ON PR: Check that CHANGELOG.md was modified
          if git diff --name-only origin/main...HEAD | grep -q "^CHANGELOG.md$"; then
            echo "OK: CHANGELOG.md has been modified"
          else
            echo "WARNING: CHANGELOG.md was not modified"
            echo "Please document your changes in CHANGELOG.md"
            exit 1
          fi
        fi

  test-cpp:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential
    - name: Configure
      run: |
        mkdir -p build
        cd build
        cmake ../cpp -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: |
        cd build
        make -j$(nproc)
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Install ndsmath
      run: |
        cp -r python/* .
        pip install -e .
    - name: Run tests
      run: |
        python -m unittest discover tests
    - name: Cleanup test environment
      run: |
        git reset --hard HEAD
        git clean -fd

  build-and-deploy-snapshot:
    needs: [check-changelog, test-cpp, test-python]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/python-build-deploy
        with:
          twine-username: ${{ secrets.NDS_ARTIFACTORY_USER }}
          twine-password: ${{ secrets.NDS_ARTIFACTORY_TOKEN }}

  build-and-deploy-release:
    needs: [test-cpp, test-python]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/python-build-deploy
        with:
          twine-username: ${{ secrets.NDS_ARTIFACTORY_USER }}
          twine-password: ${{ secrets.NDS_ARTIFACTORY_TOKEN }}
