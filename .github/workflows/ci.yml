name: ndslive-math CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Repo-hygiene gates
  # ---------------------------------------------------------------------------
  check-changelog:
    runs-on: ubuntu-latest
    # Dependabot dependency bumps don't carry a CHANGELOG entry — exempt them.
    if: |
      (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main'))
      && github.actor != 'dependabot[bot]'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Validate CHANGELOG
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          UNRELEASED=$(grep -cE "^## \[v[0-9.]+\]$" CHANGELOG.md || true)
          if [ "$UNRELEASED" -gt 0 ]; then
            echo "ERROR: Found $UNRELEASED unreleased entries on main branch"
            grep -E "^## \[v[0-9.]+\]$" CHANGELOG.md
            exit 1
          fi
          echo "OK: All changelog entries have release dates"
        else
          if git diff --name-only origin/main...HEAD | grep -q "^CHANGELOG.md$"; then
            echo "OK: CHANGELOG.md has been modified"
          else
            echo "ERROR: CHANGELOG.md was not modified. Please document your changes."
            exit 1
          fi
        fi

  check-license:
    # Every per-language LICENSE copy must match the canonical root LICENSE.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Verify LICENSE copies match root byte-for-byte
      run: |
        fail=0
        for d in python cpp java js go rust; do
          if [ -f "$d/LICENSE" ]; then
            if cmp -s LICENSE "$d/LICENSE"; then
              echo "OK: $d/LICENSE"
            else
              echo "ERROR: $d/LICENSE differs from root LICENSE"; fail=1
            fi
          else
            echo "WARNING: $d/LICENSE missing"
          fi
        done
        exit $fail

  check-parity-vectors:
    # The committed golden vectors must equal what the Python reference produces.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Regenerate vectors and fail on drift
      run: |
        PYTHONPATH=python/src python3 test-vectors/generate_vectors.py
        if ! git diff --exit-code -- test-vectors/parity_vectors.json; then
          echo "ERROR: parity_vectors.json is out of date. Regenerate and commit:"
          echo "  PYTHONPATH=python/src python3 test-vectors/generate_vectors.py"
          exit 1
        fi
        echo "OK: parity vectors are up to date"

  # ---------------------------------------------------------------------------
  # Lint + format checks (one job, all languages). CodeQL covers deeper static
  # analysis in a separate workflow.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    # Python (ruff) + the pinned clang-format used for C++.
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install ruff + clang-format
      run: pip install ruff "clang-format==20.1.7"
    - name: Python — ruff check + format
      run: |
        ruff check --config python/pyproject.toml python/ test-vectors/
        ruff format --check --config python/pyproject.toml python/ test-vectors/
    - name: C++ — clang-format
      run: |
        CF=$(python3 -c "import clang_format, os; print(os.path.join(os.path.dirname(clang_format.__file__), 'data', 'bin', 'clang-format'))")
        find cpp -type f \( -name '*.h' -o -name '*.cpp' -o -name '*.hpp' \) ! -path '*/_deps/*' -print0 \
          | xargs -0 "$CF" --dry-run --Werror

    # Rust (rustfmt + clippy)
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Rust — rustfmt + clippy
      run: |
        cargo fmt --manifest-path rust/Cargo.toml --all --check
        cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

    # Go (gofmt + vet)
    - uses: actions/setup-go@v6
      with:
        go-version: '1.22'
    - name: Go — gofmt + vet
      run: |
        unformatted=$(gofmt -l go/)
        if [ -n "$unformatted" ]; then
          echo "Unformatted Go files:"; echo "$unformatted"; exit 1
        fi
        (cd go && go vet ./...)

    # JavaScript/TypeScript (eslint + prettier)
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: js/package-lock.json
    - name: JS/TS — eslint + prettier
      working-directory: js
      run: |
        npm ci
        npm run lint
        npm run format

    # Java (spotless)
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'
    - name: Java — spotlessCheck
      working-directory: java
      run: ./gradlew spotlessCheck --no-daemon

  # ---------------------------------------------------------------------------
  # Per-language test suites (each validates against test-vectors/)
  # ---------------------------------------------------------------------------
  test-python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install package (editable) + coverage
      run: |
        python -m pip install --upgrade pip build "setuptools-scm[toml]>=8" coverage
        SETUPTOOLS_SCM_PRETEND_VERSION=$(python -m setuptools_scm) pip install -e ./python
    - name: Run tests with coverage
      run: |
        coverage run --source=ndslive -m unittest discover -s python/tests
        coverage report -m
        coverage xml -o coverage-python.xml
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v7
      with:
        files: coverage-python.xml
        flags: python
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-cpp:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -S cpp -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release
    - name: Test
      # --timeout bounds each individual test case; with catch_discover_tests a
      # single hanging Catch2 case is reported by name instead of stalling.
      run: ctest --test-dir build --output-on-failure -C Release --timeout 120

  test-java:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'
    - name: Build, test, coverage (Gradle)
      working-directory: java
      run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: java/build/reports/jacoco/test/jacocoTestReport.xml
        flags: java
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-js:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: js/package-lock.json
    - name: Install
      working-directory: js
      run: npm ci
    - name: Build + test + coverage
      working-directory: js
      run: |
        npm run build
        npm run coverage
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        directory: js/coverage
        flags: js
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v6
      with:
        go-version: '1.22'
    - name: Test with coverage
      working-directory: go
      run: |
        go vet ./...
        go test ./... -covermode=atomic -coverprofile=coverage.out
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: go/coverage.out
        flags: go
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - name: Test
      working-directory: rust
      run: cargo test
    - name: Coverage (cargo-llvm-cov)
      working-directory: rust
      run: |
        cargo install cargo-llvm-cov --locked
        cargo llvm-cov --lcov --output-path lcov.info
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: rust/lcov.info
        flags: rust
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Publishing.
  #   * Pre-releases publish from `main`; releases publish from `vX.Y.Z` tags.
  #   * Python uses PyPI Trusted Publishing (OIDC) — no stored token.
  #   * Every publish job is GATED on a repo variable (ENABLE_*_PUBLISH) so it
  #     stays inert until the corresponding account/credentials/OIDC trust is set
  #     up. Set the variable to 'true' to enable each channel.
  # ---------------------------------------------------------------------------
  publish-python-testpypi:
    needs: [check-changelog, check-license, check-parity-vectors, test-python, test-cpp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Build sdist + wheel
      run: |
        python -m pip install build "setuptools-scm[toml]>=8"
        cp -r python/* .          # put pyproject beside .git so setuptools-scm sees tags
        python -m build --outdir dist .
    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-python-pypi:
    needs: [check-changelog, check-license, check-parity-vectors, test-python, test-cpp]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Build sdist + wheel
      run: |
        python -m pip install build "setuptools-scm[toml]>=8"
        cp -r python/* .          # put pyproject beside .git so setuptools-scm sees the tag
        python -m build --outdir dist .
    - name: Publish to PyPI (Trusted Publishing)
      uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    needs: [test-js]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_NPM_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: https://registry.npmjs.org
    - name: Build + publish
      working-directory: js
      run: |
        npm ci
        npm run build
        npm publish --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crate:
    needs: [test-rust]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_CRATES_PUBLISH == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Publish to crates.io
      working-directory: rust
      run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-maven:
    needs: [test-java]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_MAVEN_PUBLISH == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'
    - name: Publish to Maven Central
      working-directory: java
      run: ./gradlew publish --no-daemon -PndslivemathVersion=${GITHUB_REF_NAME#v}
      env:
        ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
        ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
        ORG_GRADLE_PROJECT_centralUsername: ${{ secrets.MAVEN_CENTRAL_USER }}
        ORG_GRADLE_PROJECT_centralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
