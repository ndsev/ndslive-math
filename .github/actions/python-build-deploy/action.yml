name: 'Build and Deploy Python'
description: 'Build and deploy Python package to Artifactory'
inputs:
  twine-username:
    description: 'Artifactory username'
    required: true
  twine-password:
    description: 'Artifactory password'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install build twine setuptools-scm
    - name: Determine version
      id: version
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=$(cd python && python -m setuptools_scm)
        fi
        echo "VERSION=$VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Build distributions
      shell: bash
      env:
        SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.version }}
      run: |
        python -m build python/ -o dist/
    - name: Deploy to Artifactory
      shell: bash
      env:
        TWINE_USERNAME: ${{ inputs.twine-username }}
        TWINE_PASSWORD: ${{ inputs.twine-password }}
      run: |
        REPO_URL="https://artifactory.nds-association.org/artifactory/api/pypi/tooling-pypi"
        twine check dist/*
        twine upload --verbose --repository-url $REPO_URL dist/*
