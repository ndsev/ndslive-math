# Codecov configuration. Coverage is uploaded per language via flags
# (python, java, js, go, rust, cpp) from .github/workflows/ci.yml. C++ uses a
# gcovr-instrumented Debug build on the Ubuntu test-cpp leg (NDSMATH_COVERAGE).
coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 1%
    patch:
      default:
        target: 95%
        threshold: 1%

  # Exclude test code and generated/vendored material from coverage.
  ignore:
    - "**/tests/**"
    - "**/test/**"
    - "**/*.test.ts"
    - "test-vectors/**"
    - "_ext/**"

flag_management:
  default_rules:
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
