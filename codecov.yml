# Codecov configuration. Coverage is uploaded per language via flags
# (python, java, js, go, rust) from .github/workflows/ci.yml.
#
# C++ does not yet upload coverage (no lcov/gcov instrumentation wired) — it is
# excluded from the gate until that is added.
coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 1%
    patch:
      default:
        target: 95%
        threshold: 1%

  # Exclude test code and generated/vendored material from coverage.
  ignore:
    - "**/tests/**"
    - "**/test/**"
    - "**/*.test.ts"
    - "test-vectors/**"
    - "_ext/**"

flag_management:
  default_rules:
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
